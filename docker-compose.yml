services:
  nexea-form:
    build:
      context: ./nexea-form
      dockerfile: Dockerfile
      args:
        - DATABASE_URL=${DATABASE_URL}
        - JWT_SECRET=${JWT_SECRET}
        - BASE_URL=${BASE_URL}
        - NEXT_PUBLIC_RESEND_API_KEY=${NEXT_PUBLIC_RESEND_API_KEY}
    container_name: nexea-form-app
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
      - /app/.next/cache
      - /app/.next/cache/images
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - SPREADSHEET_ID=${SPREADSHEET_ID}
      - SHEET_TITLE=${SHEET_TITLE}
      - JWT_SECRET=${JWT_SECRET}
      - EMAIL_FROM=${EMAIL_FROM}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
      - BASE_URL=${BASE_URL}
      - NEXT_PUBLIC_RESEND_API_KEY=${NEXT_PUBLIC_RESEND_API_KEY}
    ports:
      - "3000:3000"
    volumes:
      - "/opt/eba-credentials.json:/etc/eba-credentials.json:ro"
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

networks:
  app-network:
    driver: bridge
